# 1. Define shared environment variables
x-environment: &env_vars
  NODE_ENV: production
  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  REDIS_URL: redis://redis:6379
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
  TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
  SYNC_CRON_SECRET: ${SYNC_CRON_SECRET}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GEMINI_API_KEY_2: ${GEMINI_API_KEY_2}
  GEMINI_API_KEY_3: ${GEMINI_API_KEY_3}
  GEMINI_API_KEY_4: ${GEMINI_API_KEY_4}
  GEMINI_API_KEY_5: ${GEMINI_API_KEY_5}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_API_KEY_2: ${OPENAI_API_KEY_2}
  OPENAI_API_KEY_3: ${OPENAI_API_KEY_3}
  OPENAI_API_KEY_4: ${OPENAI_API_KEY_4}
  OPENAI_API_KEY_5: ${OPENAI_API_KEY_5}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
  STRIPE_ELITE_PRICE_ID: ${STRIPE_ELITE_PRICE_ID}
  STRIPE_PRO_YEARLY_PRICE_ID: ${STRIPE_PRO_YEARLY_PRICE_ID}
  STRIPE_ELITE_YEARLY_PRICE_ID: ${STRIPE_ELITE_YEARLY_PRICE_ID}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
  PYTHON_NLP_SERVICE_URL: ${PYTHON_NLP_SERVICE_URL}
  MONTHLY_INFRA_ESTIMATE_CENTS: ${MONTHLY_INFRA_ESTIMATE_CENTS}
  AWS_SES_REGION: ${AWS_SES_REGION}
  AWS_SES_ACCESS_KEY_ID: ${AWS_SES_ACCESS_KEY_ID}
  AWS_SES_SECRET_ACCESS_KEY: ${AWS_SES_SECRET_ACCESS_KEY}
  SES_FROM_EMAIL: ${SES_FROM_EMAIL}
  SES_DRY_RUN: ${SES_DRY_RUN}

# 2. Define shared worker configuration
x-worker-base: &worker_base
  build:
    context: .
    dockerfile: Dockerfile
    target: worker-runner
  image: hirecanvas-worker:latest
  environment: *env_vars
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: hirecanvas-app:latest
    ports:
      - "3000:3000"
    environment: *env_vars
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker-sync:
    <<: *worker_base
    command: ["npm", "run", "worker:sync"]

  worker-extract:
    <<: *worker_base
    command: ["npm", "run", "worker:extract"]

  worker-nudge:
    <<: *worker_base
    command: ["npm", "run", "worker:nudge"]

  worker-digest:
    <<: *worker_base
    command: ["npm", "run", "worker:digest"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data: