services:
  # The "Primary" web service uses the final standalone image
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hirecanvas-app:latest
    ports:
      - "3000:3000"
    environment: &env_vars
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_SES_REGION: ${AWS_SES_REGION}
      AWS_SES_ACCESS_KEY_ID: ${AWS_SES_ACCESS_KEY_ID}
      AWS_SES_SECRET_ACCESS_KEY: ${AWS_SES_SECRET_ACCESS_KEY}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL}
      SES_DRY_RUN: ${SES_DRY_RUN}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Worker services use the 'builder' target so they have access to the src code & tsx
  worker-sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment: *env_vars
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker:sync"]
    restart: unless-stopped

  worker-extract:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment: *env_vars
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker:extract"]
    restart: unless-stopped

  worker-nudge:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment: *env_vars
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker:nudge"]
    restart: unless-stopped

  worker-digest:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment: *env_vars
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker:digest"]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
