name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Integration CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /opt/hirecanvas
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

      - name: Smoke test deployment
        run: |
          set -e
          HEALTH_URL="${{ secrets.APP_HEALTH_URL }}"
          if [ -z "$HEALTH_URL" ]; then
            echo "APP_HEALTH_URL secret is required"
            exit 1
          fi
          RESPONSE=$(curl -sSf --retry 5 --retry-delay 5 --retry-all-errors "$HEALTH_URL")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "$RESPONSE" | grep -q '"db":true'
          echo "$RESPONSE" | grep -q '"redis":true'