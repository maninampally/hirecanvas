# HireCanvas Nginx Configuration
# SSL termination, reverse proxy, rate limiting, gzip compression

upstream nextjs_app {
    server app:3000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name hirecanvas.in www.hirecanvas.in;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name hirecanvas.in www.hirecanvas.in;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/hirecanvas.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hirecanvas.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

    # Rate Limiting (100 requests per minute per IP)
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/m;
    limit_req zone=global_limit burst=200 nodelay;

    # Logging
    access_log /var/log/nginx/hirecanvas_access.log;
    error_log /var/log/nginx/hirecanvas_error.log;

    # Proxy Settings
    client_max_body_size 10M;

    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /api/health {
        proxy_pass http://nextjs_app;
        access_log off;
    }
}
