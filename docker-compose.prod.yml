services:
  app:
    ports: []
    environment:
      NODE_ENV: production
    expose:
      - "3000"

  redis:
    ports: []

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/hirecanvas.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

volumes:
  nginx_logs:
